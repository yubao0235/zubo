# 在 .github/workflows/docker-build.yml 中
name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 🔥 这一步非常重要，给予写权限

    steps:
      - uses: actions/checkout@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 自动生成，不需要你申请
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          # 格式: ghcr.io/你的GitHub用户名/仓库名:latest
          tags: ghcr.io/yubao0235/zubo:latest
